<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Planeador de Rutas Michoacán</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: #ffffff;
      padding: 22px;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      box-shadow: 4px 0 20px rgba(0,0,0,0.06);
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .subtitle {
      margin: 8px 0 18px;
      color: #6b7280;
      font-size: 14px;
    }

    .card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 13px;
      color: #374151;
    }

    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      background: white;
    }

    select[multiple] { min-height: 110px; }

    button {
      cursor: pointer;
      font-weight: 800;
      border: none;
      margin-top: 10px;
    }

    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .btn-danger { background: #dc2626; color: white; }

    .hint {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }

    .selected-list {
      padding-left: 18px;
      font-size: 14px;
      line-height: 1.7;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .stat small { color: #6b7280; }
    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .route-box {
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar { height: 45vh; }
      #map { height: 55vh; }
    }
  </style>
</head>

<body>
<div class="app">
  <aside class="sidebar">
    <h1>Planeador de rutas</h1>
    <p class="subtitle">Carga automática desde config.txt, con opción de subir otro CSV.</p>

    <div class="card">
      <b>CSV</b>
      <p class="hint" id="csvActual">Cargando configuración...</p>

      <label>Subir CSV distinto</label>
      <input type="file" id="csvFile" accept=".csv" />

      <button class="btn-primary" onclick="cargarPuntos()">Cargar puntos</button>
    </div>

    <div class="card">
      <label>Columna municipio</label>
      <select id="colMunicipio"></select>

      <label>Columna UTM Este / X</label>
      <select id="colEste"></select>

      <label>Columna UTM Norte / Y</label>
      <select id="colNorte"></select>

      <label>Zona UTM del CSV</label>
      <select id="zonaUtm">
        <option value="EPSG:32614">14N - Michoacán común</option>
        <option value="EPSG:32613">13N - alternativa</option>
      </select>

      <label>Columnas para mostrar al hacer click</label>
      <select id="popupCols" multiple></select>
    </div>

    <div class="card">
      <div class="hint">
        <b>Click normal:</b> muestra información.<br>
        <b>Ctrl + click:</b> selecciona o quita destino.<br>
        En Mac usa <b>Cmd + click</b>.
      </div>

      <button class="btn-primary" onclick="calcularRuta()">Calcular ruta circular</button>
      <button class="btn-secondary" onclick="limpiarRuta()">Borrar ruta</button>
      <button class="btn-danger" onclick="limpiarSeleccion()">Limpiar selección</button>
    </div>

    <div class="card">
      <b>Origen</b>
      <p id="origenTexto" class="hint"></p>
    </div>

    <div class="card">
      <b>Destinos seleccionados</b>
      <ol id="listaSeleccionados" class="selected-list"></ol>
    </div>

    <div class="card route-box" id="resultadoRuta">
      Aún no hay ruta calculada.
    </div>
  </aside>

  <main>
    <div id="map"></div>
  </main>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>

<script>
  let CONFIG = {};

  let ORIGEN = {
    nombre: "Mi origen",
    este: 275000,
    norte: 2180000,
    epsg: "EPSG:32614"
  };

  proj4.defs("EPSG:32614", "+proj=utm +zone=14 +datum=WGS84 +units=m +no_defs");
  proj4.defs("EPSG:32613", "+proj=utm +zone=13 +datum=WGS84 +units=m +no_defs");

  let rawData = [];
  let puntos = [];
  let markers = [];
  let seleccionados = [];
  let rutaLayer = null;
  let origenLat = null;
  let origenLon = null;
  let origenMarker = null;

  const map = L.map("map", { zoomControl: false }).setView([19.7, -101.2], 8);

  L.control.zoom({ position: "bottomright" }).addTo(map);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap"
  }).addTo(map);

  const origenIcon = L.icon({
    iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
    iconSize: [34, 34],
    iconAnchor: [17, 34]
  });

  const blueIcon = L.icon({
    iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });

  const redIcon = L.icon({
    iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });

  iniciar();

  async function iniciar() {
    await cargarConfig();
    configurarOrigen();
    await cargarCSVDefault();
  }

  async function cargarConfig() {
    const res = await fetch("config.txt");
    const txt = await res.text();

    txt.split(/\r?\n/).forEach(line => {
      line = line.trim();

      if (!line || line.startsWith("#")) return;

      const idx = line.indexOf("=");

      if (idx === -1) return;

      const key = line.slice(0, idx).trim();
      const value = line.slice(idx + 1).trim();

      CONFIG[key] = value;
    });

    ORIGEN = {
      nombre: CONFIG.ORIGEN_NOMBRE || "Mi origen",
      este: parseFloat(CONFIG.ORIGEN_ESTE),
      norte: parseFloat(CONFIG.ORIGEN_NORTE),
      epsg: CONFIG.ORIGEN_EPSG || "EPSG:32614"
    };
  }

  function configurarOrigen() {
    const origenLonLat = proj4(
      ORIGEN.epsg,
      "EPSG:4326",
      [ORIGEN.este, ORIGEN.norte]
    );

    origenLon = origenLonLat[0];
    origenLat = origenLonLat[1];

    document.getElementById("origenTexto").innerText =
      `${ORIGEN.nombre} | Este: ${ORIGEN.este}, Norte: ${ORIGEN.norte}`;

    if (origenMarker) {
      map.removeLayer(origenMarker);
    }

    origenMarker = L.marker([origenLat, origenLon], { icon: origenIcon })
      .addTo(map)
      .bindPopup(`
        <b>ORIGEN</b><br>
        ${ORIGEN.nombre}<br><br>
        <b>UTM Este:</b> ${ORIGEN.este}<br>
        <b>UTM Norte:</b> ${ORIGEN.norte}
      `);
  }

  async function cargarCSVDefault() {
    const csvDefault = CONFIG.CSV_DEFAULT;

    if (!csvDefault) {
      document.getElementById("csvActual").innerText =
        "No hay CSV_DEFAULT definido en config.txt.";
      return;
    }

    try {
      const res = await fetch(csvDefault);

      if (!res.ok) throw new Error("No se pudo cargar el CSV por defecto.");

      const txt = await res.text();

      Papa.parse(txt, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          rawData = results.data;
          llenarSelectores(results.meta.fields);
          aplicarConfigColumnas();
          document.getElementById("csvActual").innerText =
            `Usando CSV por defecto: ${csvDefault}`;
          cargarPuntos();
        }
      });
    } catch (err) {
      document.getElementById("csvActual").innerText =
        `No se pudo cargar ${csvDefault}. Puedes subir otro CSV manualmente.`;
    }
  }

  document.getElementById("csvFile").addEventListener("change", function(e) {
    const file = e.target.files[0];

    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        rawData = results.data;
        llenarSelectores(results.meta.fields);
        aplicarConfigColumnas();
        document.getElementById("csvActual").innerText =
          `Usando CSV subido: ${file.name}`;
        cargarPuntos();
      }
    });
  });

  function llenarSelectores(cols) {
    ["colMunicipio", "colEste", "colNorte", "popupCols"].forEach(id => {
      const select = document.getElementById(id);
      select.innerHTML = "";

      cols.forEach(col => {
        const option = document.createElement("option");
        option.value = col;
        option.textContent = col;
        select.appendChild(option);
      });
    });
  }

  function seleccionarValor(id, valor) {
    if (!valor) return;

    const select = document.getElementById(id);

    Array.from(select.options).forEach(opt => {
      if (opt.value === valor) {
        select.value = valor;
      }
    });
  }

  function aplicarConfigColumnas() {
    seleccionarValor("colMunicipio", CONFIG.COLUMNA_MUNICIPIO);
    seleccionarValor("colEste", CONFIG.COLUMNA_ESTE);
    seleccionarValor("colNorte", CONFIG.COLUMNA_NORTE);
    seleccionarValor("zonaUtm", CONFIG.ZONA_CSV);

    const colsPopup = (CONFIG.COLUMNAS_POPUP || "")
      .split(",")
      .map(x => x.trim())
      .filter(Boolean);

    const popupSelect = document.getElementById("popupCols");

    Array.from(popupSelect.options).forEach(opt => {
      opt.selected = colsPopup.includes(opt.value);
    });
  }

  function cargarPuntos() {
    limpiarMapa();

    const colMunicipio = document.getElementById("colMunicipio").value;
    const colEste = document.getElementById("colEste").value;
    const colNorte = document.getElementById("colNorte").value;
    const epsg = document.getElementById("zonaUtm").value;

    const popupCols = Array.from(
      document.getElementById("popupCols").selectedOptions
    ).map(o => o.value);

    rawData.forEach((row, index) => {
      const este = parseFloat(row[colEste]);
      const norte = parseFloat(row[colNorte]);

      if (isNaN(este) || isNaN(norte)) return;

      const lonLat = proj4(epsg, "EPSG:4326", [este, norte]);

      const punto = {
        id: index,
        nombre: row[colMunicipio],
        este,
        norte,
        lon: lonLat[0],
        lat: lonLat[1],
        row
      };

      puntos.push(punto);

      let popup = `<b>${punto.nombre}</b><br><br>`;

      popupCols.forEach(col => {
        popup += `<b>${col}:</b> ${row[col]}<br>`;
      });

      const marker = L.marker([punto.lat, punto.lon], { icon: blueIcon })
        .addTo(map)
        .bindPopup(popup);

      marker.on("click", function(e) {
        if (e.originalEvent.ctrlKey || e.originalEvent.metaKey) {
          toggleSeleccion(punto.id);
          e.originalEvent.preventDefault();
          e.originalEvent.stopPropagation();
        } else {
          marker.openPopup();
        }
      });

      punto.marker = marker;
      markers.push(marker);
    });

    if (puntos.length > 0) {
      const bounds = L.latLngBounds([
        [origenLat, origenLon],
        ...puntos.map(p => [p.lat, p.lon])
      ]);

      map.fitBounds(bounds, { padding: [40, 40] });
    }
  }

  function toggleSeleccion(id) {
    if (seleccionados.includes(id)) {
      seleccionados = seleccionados.filter(x => x !== id);
    } else {
      seleccionados.push(id);
    }

    actualizarSeleccionVisual();
  }

  function actualizarSeleccionVisual() {
    puntos.forEach(p => {
      p.marker.setIcon(seleccionados.includes(p.id) ? redIcon : blueIcon);
    });

    const lista = document.getElementById("listaSeleccionados");
    lista.innerHTML = "";

    seleccionados.forEach(id => {
      const p = puntos.find(x => x.id === id);
      const li = document.createElement("li");
      li.textContent = p.nombre;
      lista.appendChild(li);
    });
  }

  function limpiarSeleccion() {
    seleccionados = [];
    limpiarRuta();
    actualizarSeleccionVisual();
  }

  function limpiarRuta() {
    if (rutaLayer) {
      map.removeLayer(rutaLayer);
      rutaLayer = null;
    }

    document.getElementById("resultadoRuta").innerHTML =
      "Aún no hay ruta calculada.";
  }

  function limpiarMapa() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    puntos = [];
    seleccionados = [];
    limpiarRuta();
    actualizarSeleccionVisual();
  }

  function permutaciones(arr) {
    if (arr.length <= 1) return [arr];

    let result = [];

    arr.forEach((item, i) => {
      const rest = arr.slice(0, i).concat(arr.slice(i + 1));

      permutaciones(rest).forEach(p => {
        result.push([item].concat(p));
      });
    });

    return result;
  }

  async function obtenerRuta(ordenIds) {
    const coords = [
      [origenLon, origenLat],
      ...ordenIds.map(id => {
        const p = puntos.find(x => x.id === id);
        return [p.lon, p.lat];
      }),
      [origenLon, origenLat]
    ];

    const coordStr = coords.map(c => `${c[0]},${c[1]}`).join(";");

    const url =
      `https://router.project-osrm.org/route/v1/driving/${coordStr}` +
      `?overview=full&geometries=geojson&steps=false`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.code !== "Ok") return null;

    return {
      ordenIds,
      distanciaKm: data.routes[0].distance / 1000,
      duracionMin: data.routes[0].duration / 60,
      geometry: data.routes[0].geometry.coordinates
    };
  }

  async function calcularRuta() {
    if (seleccionados.length < 1) {
      alert("Selecciona al menos un destino con Ctrl + click.");
      return;
    }

    limpiarRuta();

    document.getElementById("resultadoRuta").innerHTML =
      "Calculando ruta circular...";

    let mejor = null;

    if (seleccionados.length <= 8) {
      const perms = permutaciones(seleccionados);

      for (const perm of perms) {
        const ruta = await obtenerRuta(perm);

        if (!ruta) continue;

        if (!mejor || ruta.distanciaKm < mejor.distanciaKm) {
          mejor = ruta;
        }
      }
    } else {
      mejor = await obtenerRuta(ordenCercano(seleccionados));
    }

    if (!mejor) {
      document.getElementById("resultadoRuta").innerHTML =
        "<b>No se pudo calcular la ruta.</b>";
      return;
    }

    const linea = mejor.geometry.map(c => [c[1], c[0]]);

    rutaLayer = L.polyline(linea, {
      weight: 6,
      opacity: 0.9,
      color: "#2563eb"
    }).addTo(map);

    map.fitBounds(rutaLayer.getBounds(), { padding: [40, 40] });

    const nombresOrden = mejor.ordenIds.map(id => {
      const p = puntos.find(x => x.id === id);
      return p.nombre;
    });

    document.getElementById("resultadoRuta").innerHTML = `
      <b>Ruta circular calculada</b><br><br>
      ${ORIGEN.nombre} → ${nombresOrden.join(" → ")} → ${ORIGEN.nombre}

      <div class="stats">
        <div class="stat">
          <small>Distancia</small>
          <strong>${mejor.distanciaKm.toFixed(2)} km</strong>
        </div>
        <div class="stat">
          <small>Duración</small>
          <strong>${mejor.duracionMin.toFixed(1)} min</strong>
        </div>
      </div>
    `;
  }

  function distanciaEuclidiana(a, b) {
    const dx = a.lon - b.lon;
    const dy = a.lat - b.lat;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function ordenCercano(ids) {
    let restantes = [...ids];
    let orden = [];

    let actual = {
      lon: origenLon,
      lat: origenLat
    };

    while (restantes.length > 0) {
      let mejorId = null;
      let mejorDist = Infinity;

      restantes.forEach(id => {
        const p = puntos.find(x => x.id === id);
        const d = distanciaEuclidiana(actual, p);

        if (d < mejorDist) {
          mejorDist = d;
          mejorId = id;
        }
      });

      orden.push(mejorId);

      const siguiente = puntos.find(x => x.id === mejorId);
      actual = siguiente;

      restantes = restantes.filter(id => id !== mejorId);
    }

    return orden;
  }
</script>
</body>
</html>
